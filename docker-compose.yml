version: "3.9"
services:
  db:
    image: postgres:15-alpine
    container_name: hx_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: haulagex
    ports:
      - "5432:5432"
    volumes:
      - hx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: hx_adminer
    depends_on:
      - db
    ports:
      - "8081:8080"

volumes:
  hx_pgdata:
